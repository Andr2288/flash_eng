openapi: 3.0.0

info:
  title: FlashEng API
  version: 1.0.0
  description: API for English learning application FlashEng

servers:
  - url: http://localhost:3000

paths:
  /api/vocabulary:
    get:
      summary: Get all vocabulary words
      responses:
        "200":
          description: List of words returned

    post:
      summary: Add new vocabulary word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabularyWord"
      responses:
        "201":
          description: Word created

  /api/vocabulary/{id}:
    get:
      summary: Get word by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Word found
        "404":
          description: Word not found

    patch:
      summary: Update word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
        "404":
          description: Not found

    delete:
      summary: Delete word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found

  /api/exercises/generate:
    post:
      summary: Generate exercise using AI
      responses:
        "200":
          description: Exercise generated

  /api/exercises/check:
    post:
      summary: Check user answer
      responses:
        "200":
          description: Result returned

components:
  schemas:
    VocabularyWord:
      type: object
      properties:
        text:
          type: string
          example: apple
        topic:
          type: string
          example: food
        status:
          type: string
          example: NEW
